name: SDK Release

# Trigger on version tags, e.g. v0.1.0, v1.2.3
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    # Trusted Publisher permissions (configure at pypi.org — no secrets required)
    permissions:
      id-token: write   # required for OIDC Trusted Publisher
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dev dependencies
        working-directory: sdk
        run: uv pip install --system -e ".[dev]"

      - name: Run test suite (gate before publish)
        working-directory: sdk
        run: python -m pytest tests/ -v --tb=short

      - name: Run SPEC compliance (gate before publish)
        working-directory: sdk
        run: python -m pytest tests/test_spec_compliance.py -v

      - name: Build wheel and sdist
        working-directory: sdk
        run: uv build

      - name: Publish to PyPI
        # Requires a Trusted Publisher configured at pypi.org:
        #   Publisher: GitHub Actions
        #   Owner: spritesai
        #   Repository: aios-brain
        #   Workflow: sdk-release.yml
        #   Environment: (leave blank for tag-triggered releases)
        # No API token or secret is needed — OIDC handles auth.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
