site_name: Gradata
site_description: Learns from corrections. Enforces with hooks. Procedural memory for AI agents.
site_url: https://docs.gradata.ai/
repo_url: https://github.com/Gradata/gradata
repo_name: Gradata/gradata
docs_dir: docs
strict: true

validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: warn
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: warn

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Light mode
    - scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
    - search.share
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/theme.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Gradata/gradata
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/gradata/

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/install.md
    - Your First Brain: getting-started/first-brain.md
    - Claude Code Setup: getting-started/claude-code.md
  - Concepts:
    - Corrections: concepts/corrections.md
    - Graduation: concepts/graduation.md
    - Meta-Rules: concepts/meta-rules.md
  - SDK:
    - Brain Class: sdk/brain.md
    - Middleware: sdk/middleware.md
    - Rule-to-Hook: sdk/rule-to-hook.md
  - Cloud:
    - Overview: cloud/overview.md
    - Dashboard: cloud/dashboard.md
    - API Reference: cloud/api.md
  - CLI: cli.md
  - FAQ: faq.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
