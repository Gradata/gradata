[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aios-brain"
version = "0.1.0"
description = "Personal AI Brain SDK — build, train, and share AI brains that compound knowledge over time"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Oliver", email = "oliver@spritesai.com" },
]
keywords = ["ai", "brain", "sdk", "memory", "agents", "claude"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "chromadb>=0.5.0",
]

[project.optional-dependencies]
gemini = ["google-genai>=1.0.0"]
local = []  # chromadb includes sentence-transformers as transitive dep

[project.scripts]
aios-brain = "aios_brain.cli:main"

[project.urls]
Homepage = "https://github.com/spritesai/aios-brain"
Documentation = "https://github.com/spritesai/aios-brain#readme"

[tool.hatch.build.targets.wheel]
packages = ["aios_brain"]
